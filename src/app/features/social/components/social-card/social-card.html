<a [href]="item.url" target="_blank" rel="noopener noreferrer"
    class="group relative block min-h-[280px] overflow-hidden rounded-[32px] border border-white/30 p-8 text-white shadow-[0_12px_40px_rgba(0,0,0,0.12)] backdrop-blur-sm transition duration-500 hover:-translate-y-1 hover:shadow-[0_18px_50px_rgba(0,0,0,0.16)]"
    [ngClass]="item.color">
    <div class="absolute inset-0 bg-gradient-to-br from-white/10 via-white/5 to-black/10"></div>

    <div class="absolute inset-0 bg-center bg-no-repeat opacity-[0.14] transition duration-500 group-hover:opacity-[0.18]"
        [style.background-image]="'url(' + item.image + ')'" [style.background-size]="'140px'"></div>

    <div class="absolute inset-0 bg-black/10 group-hover:bg-black/15 transition duration-500"></div>

    <div class="relative z-10 flex h-full flex-col justify-between">
        <div class="flex items-center justify-between">
            <div
                class="flex h-12 w-12 items-center justify-center rounded-2xl bg-white/15 text-2xl shadow-sm backdrop-blur-sm">
                <span>{{ item.icon }}</span>
            </div>

            <span
                class="rounded-full border border-white/20 bg-white/10 px-3 py-1 text-xs font-semibold tracking-wide text-white/80 backdrop-blur-sm">
                Explore
            </span>
        </div>

        <div class="mt-12">
            <h3 class="text-2xl font-bold tracking-tight">
                {{ item.title }}
            </h3>

            <p class="mt-3  text-sm leading-6 text-white/85 text-center">
                {{ item.description }}
            </p>
        </div>
    </div>
</a>
