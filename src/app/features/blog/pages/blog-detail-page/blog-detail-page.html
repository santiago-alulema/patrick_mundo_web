<app-home-navbar [items]="navItems"></app-home-navbar>

<div class="detail-page">
    <div class="state-box" *ngIf="loading()">
        Loading article...
    </div>

    <div class="state-box error" *ngIf="errorMessage()">
        {{ errorMessage() }}
    </div>

    <article class="newspaper" *ngIf="post() as article">
        <header class="newspaper-header">
            <a routerLink="/blogs" class="back-link">
                ← Back to blog
            </a>

            <div class="paper-meta">
                <span>{{ article.category?.name || 'Travel' }}</span>
                <strong>{{ formatDate(article.createdAt) }}</strong>
            </div>

            <h1>{{ article.title }}</h1>

            <p class="summary">
                {{ article.summary }}
            </p>
        </header>

        <section class="newspaper-body">
            <figure class="article-image">
                <img [src]="article.coverImage" [alt]="article.title" />
                <figcaption>
                    {{ article.summary }}
                </figcaption>
            </figure>

            <div class="article-text">
                <p *ngFor="let paragraph of article.content.split('\n')">
                    {{ capitalizeFirstLetter(paragraph) }}
                </p>
            </div>
        </section>
    </article>
</div>
