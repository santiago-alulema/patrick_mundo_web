<div class="rounded-[28px] bg-white/95 p-6 shadow-xl backdrop-blur-sm">
    <p class="text-base leading-7 text-neutral-700">
        {{ item.comment }}
    </p>

    <div class="mt-6 flex items-center gap-4">
        <img [src]="item.avatar" [alt]="item.name" class="h-12 w-12 rounded-full object-cover" />

        <div>
            <h4 class="font-bold text-neutral-900">{{ item.name }}</h4>
            <div class="mt-1 flex gap-1 text-orange-500">
                @for (star of stars; track $index) {
                <span>★</span>
                }
            </div>
        </div>
    </div>
</div>
