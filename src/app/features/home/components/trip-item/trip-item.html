<div class="flex items-start gap-4 rounded-[28px] 
           bg-white border border-neutral-200 
           p-5 shadow-lg shadow-black/5
           hover:shadow-xl hover:-translate-y-1
           transition-all duration-300">

    <img [src]="item.image" [alt]="item.title" class="h-28 w-28 rounded-2xl object-cover border border-neutral-200" />

    <div>
        <h3 class="text-2xl font-bold text-neutral-900">
            {{ item.title }}
        </h3>

        <p class="mt-2 text-base leading-7 text-neutral-600">
            {{ item.description }}
        </p>
    </div>
</div>
