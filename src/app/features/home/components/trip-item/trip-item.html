<div class="flex items-start gap-4 rounded-[28px] bg-white p-4 shadow-sm">
    <img [src]="item.image" [alt]="item.title" class="h-28 w-28 rounded-2xl object-cover" />

    <div>
        <h3 class="text-2xl font-bold text-neutral-900">
            {{ item.title }}
        </h3>

        <p class="mt-2 text-base leading-7 text-neutral-600">
            {{ item.description }}
        </p>
    </div>
</div>
