<div class="overflow-hidden rounded-[28px] bg-white shadow-lg">
    <div class="relative h-64 overflow-hidden">
        <img [src]="item.image" [alt]="item.title" class="h-full w-full object-cover" />
        <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/70 to-transparent p-4">
            <h3 class="text-xl font-bold text-white">{{ item.title }}</h3>
        </div>
    </div>

    <div class="p-5">
        <p class="min-h-[110px] text-sm leading-7 text-neutral-600">
            {{ item.description }}
        </p>

        <button type="button"
            class="mt-5 w-full rounded-full bg-orange-500 px-5 py-3 text-sm font-bold text-white transition hover:bg-orange-600">
            MORE INFO
        </button>
    </div>
</div>
