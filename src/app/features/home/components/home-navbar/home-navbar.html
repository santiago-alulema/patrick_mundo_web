<nav class="sticky top-0 z-50 border-b border-white/20 bg-white/75 backdrop-blur-md">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 md:px-8">

        <button type="button" (click)="openSidebar()"
            class="flex items-center gap-2 rounded-full px-2 py-1 transition hover:bg-white/60">
            <img src="images/image-inicio_2.png" alt="Explore" class="h-8 w-8 rounded-full object-cover" />
            <span class="text-sm font-extrabold tracking-wide text-neutral-800 md:text-base">
                EXPLORE
            </span>
        </button>

        <div class="hidden items-center gap-8 md:flex">
            @for (item of items; track item.sectionId) {
            <button type="button" (click)="onNavigate(item.sectionId)"
                class="text-sm font-medium text-neutral-700 transition hover:text-orange-500">
                {{ item.label }}
            </button>
            }
        </div>

        <div class="hidden items-center gap-3 md:flex">
            <button type="button" (click)="changeLanguage('es')"
                class="rounded-full border border-neutral-300 bg-white p-1 shadow-sm transition hover:scale-105 hover:border-orange-400"
                [class.ring-2]="selectedLanguage() === 'es'" [class.ring-orange-400]="selectedLanguage() === 'es'">
                <img src="https://flagcdn.com/w40/es.png" alt="Español" class="h-8 w-8 rounded-full object-cover" />
            </button>

            <button type="button" (click)="changeLanguage('en')"
                class="rounded-full border border-neutral-300 bg-white p-1 shadow-sm transition hover:scale-105 hover:border-orange-400"
                [class.ring-2]="selectedLanguage() === 'en'" [class.ring-orange-400]="selectedLanguage() === 'en'">
                <img src="https://flagcdn.com/w40/gb.png" alt="English" class="h-8 w-8 rounded-full object-cover" />
            </button>

            <button type="button" (click)="changeLanguage('ga')"
                class="rounded-full border border-neutral-300 bg-white p-1 shadow-sm transition hover:scale-105 hover:border-orange-400"
                [class.ring-2]="selectedLanguage() === 'ga'" [class.ring-orange-400]="selectedLanguage() === 'ga'">
                <img src="https://flagcdn.com/w40/ie.png" alt="Irlandés" class="h-8 w-8 rounded-full object-cover" />
            </button>
        </div>

        <button type="button" class="rounded-xl border border-neutral-300 px-3 py-2 md:hidden"
            (click)="mobileMenuOpen.set(!mobileMenuOpen())">
            ☰
        </button>
    </div>

    @if (mobileMenuOpen()) {
    <div class="border-t border-neutral-200 bg-white px-4 py-4 md:hidden">
        <div class="flex flex-col gap-3">
            @for (item of items; track item.sectionId) {
            <button type="button" (click)="onNavigate(item.sectionId)"
                class="rounded-xl px-3 py-2 text-left text-sm font-medium text-neutral-700 hover:bg-neutral-100">
                {{ item.label }}
            </button>
            }

            <div class="mt-2 flex gap-3">
                <button type="button" (click)="changeLanguage('es')"
                    class="rounded-full border border-neutral-300 bg-white p-1 shadow-sm transition hover:scale-105"
                    [class.ring-2]="selectedLanguage() === 'es'" [class.ring-orange-400]="selectedLanguage() === 'es'">
                    <img src="https://flagcdn.com/w40/es.png" alt="Español" class="h-8 w-8 rounded-full object-cover" />
                </button>

                <button type="button" (click)="changeLanguage('en')"
                    class="rounded-full border border-neutral-300 bg-white p-1 shadow-sm transition hover:scale-105"
                    [class.ring-2]="selectedLanguage() === 'en'" [class.ring-orange-400]="selectedLanguage() === 'en'">
                    <img src="https://flagcdn.com/w40/gb.png" alt="English" class="h-8 w-8 rounded-full object-cover" />
                </button>

                <button type="button" (click)="changeLanguage('ga')"
                    class="rounded-full border border-neutral-300 bg-white p-1 shadow-sm transition hover:scale-105"
                    [class.ring-2]="selectedLanguage() === 'ga'" [class.ring-orange-400]="selectedLanguage() === 'ga'">
                    <img src="https://flagcdn.com/w40/ie.png" alt="Irlandés"
                        class="h-8 w-8 rounded-full object-cover" />
                </button>
            </div>
        </div>
    </div>
    }
</nav>

@if (sidebarOpen()) {
<div class="fixed inset-0 z-[60] bg-black/40 backdrop-blur-[2px]" (click)="closeSidebar()"></div>
}

<aside
    class="fixed left-0 top-0 z-[70] flex h-screen w-[290px] flex-col bg-white shadow-2xl transition-transform duration-300"
    [class.translate-x-0]="sidebarOpen()" [class.-translate-x-full]="!sidebarOpen()">
    <div class="flex items-center justify-between border-b border-neutral-200 px-5 py-4">
        <div class="flex items-center gap-3">
            <img src="images/image-inicio_2.png" alt="Explore" class="h-10 w-10 rounded-full object-cover" />
            <div>
                <p class="text-sm font-black tracking-wide text-neutral-900">EXPLORE</p>
                <p class="text-xs text-neutral-500">Travel menu</p>
            </div>
        </div>

        <button type="button" (click)="closeSidebar()"
            class="rounded-full p-2 text-neutral-600 transition hover:bg-neutral-100">
            ✕
        </button>
    </div>

    <div class="flex-1 px-4 py-5">
        <nav class="flex flex-col gap-2">
            @for (item of sidebarItems; track item.label) {
            @if (item.route) {
            <a [routerLink]="item.route" (click)="closeSidebar()"
                class="rounded-2xl px-4 py-3 text-sm font-semibold text-neutral-700 transition hover:bg-orange-50 hover:text-orange-500">
                {{ item.label }}
            </a>
            } @else {
            <button type="button" (click)="onNavigate(item.sectionId)"
                class="rounded-2xl px-4 py-3 text-left text-sm font-semibold text-neutral-700 transition hover:bg-orange-50 hover:text-orange-500">
                {{ item.label }}
            </button>
            }
            }
        </nav>
    </div>

    <div class="border-t border-neutral-200 px-4 py-4">
        <p class="mb-3 text-xs font-semibold uppercase tracking-wider text-neutral-400">
            Sígueme
        </p>

        <div class="flex gap-3">
            <a href="#"
                class="rounded-full bg-neutral-100 px-4 py-2 text-sm font-medium text-neutral-700 transition hover:bg-orange-100 hover:text-orange-500">
                Facebook
            </a>
            <a href="#"
                class="rounded-full bg-neutral-100 px-4 py-2 text-sm font-medium text-neutral-700 transition hover:bg-orange-100 hover:text-orange-500">
                Instagram
            </a>
        </div>
    </div>
</aside>
