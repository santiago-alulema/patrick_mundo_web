<section class="relative min-h-screen bg-cover bg-center bg-no-repeat brightness-75 contrast-110 saturate-90"
    [style.background-image]="'url(' + mockData.backgroundImage + ')'">
    <div class="absolute inset-0 bg-white/50"></div>

    <div class="relative z-10 flex min-h-screen items-center justify-center px-4">
        <div class="flex w-full max-w-5xl flex-col items-center text-center">
            <img [src]="mockData.logo" alt="Logo Patrick Mundo" class="mb-4 w-28 md:w-36 lg:w-60" />

            <h1 class="text-4xl font-extrabold tracking-wide text-black md:text-6xl">
                {{ mockData.title }}
            </h1>

            <p class="mt-3 text-2xl font-semibold text-black md:text-4xl">
                {{ mockData.subtitle }}
            </p>

            <div class="relative mt-5 w-[260px] md:w-[360px] lg:w-[420px]">
                <div class="h-5 overflow-hidden rounded-full bg-orange-200 shadow-inner">
                    <div class="h-full rounded-full bg-orange-500 transition-all duration-75"
                        [style.width.%]="progress()"></div>
                </div>

                <img [src]="mockData.carImage" alt="Carro"
                    class="absolute -top-6 w-14 -translate-x-1/2 transition-all duration-75 md:w-16"
                    [style.left.%]="progress()" />
            </div>

            <p class="mt-6 text-sm font-medium text-black/70 md:text-base">
                {{ progress() }}%
            </p>
        </div>
    </div>
</section>
