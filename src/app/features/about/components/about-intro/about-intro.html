<div class="grid gap-8 lg:grid-cols-[420px_1fr]">
    <div class="rounded-[32px] bg-[#d9d0c0] p-5 shadow-[0_12px_35px_rgba(0,0,0,0.08)]">
        <div class="overflow-hidden rounded-[26px]">
            <img [src]="data.image" [alt]="data.name" class="h-[420px] w-full object-cover" />
        </div>

        <div class="mt-6">
            <h2 class="text-3xl font-bold text-neutral-900">
                {{ data.name }}
            </h2>

            <p class="mt-2 text-sm font-medium uppercase tracking-[0.15em] text-[#9a6a2f]">
                {{ data.role }}
            </p>
        </div>
    </div>

    <div class="rounded-[32px] bg-[#cf6a1d] p-8 text-white shadow-[0_12px_35px_rgba(0,0,0,0.10)] md:p-10 lg:p-12">
        <div class="max-w-2xl">
            <h3 class="text-2xl font-bold md:text-3xl">
                A few words about this website & me
            </h3>

            <div class="mt-6 space-y-5 text-base leading-8 text-white/90 md:text-lg">
                <p>{{ data.description1 }}</p>
                <p>{{ data.description2 }}</p>
                <p>{{ data.description3 }}</p>
            </div>

            <button type="button"
                class="mt-10 rounded-full bg-black px-8 py-3 text-sm font-bold tracking-wide text-white transition hover:scale-[1.02] hover:bg-neutral-900">
                {{ data.cta }}
            </button>
        </div>
    </div>
</div>
