<div class="grid gap-6 md:grid-cols-2 xl:grid-cols-3">
    @for (item of items; track item.title) {
    <div
        class="rounded-[28px] border border-black/5 bg-white/80 p-6 shadow-[0_10px_30px_rgba(0,0,0,0.06)] backdrop-blur-sm">
        <div class="mb-4 h-12 w-12 rounded-2xl bg-[#f2dfc7]"></div>

        <h3 class="text-xl font-bold text-neutral-900">
            {{ item.title }}
        </h3>

        <p class="mt-3 text-sm leading-7 text-neutral-600 md:text-base">
            {{ item.description }}
        </p>
    </div>
    }
</div>
