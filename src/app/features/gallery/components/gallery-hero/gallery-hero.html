<section class="relative overflow-hidden border-b border-fuchsia-500/50 bg-cover bg-center bg-no-repeat"
    [style.background-image]="'url(' + backgroundImage + ')'">
    <div class="absolute inset-0 bg-black/35 backdrop-blur-[2px]"></div>

    <div
        class="relative z-10 flex min-h-[320px] flex-col items-center justify-center px-4 py-10 text-center text-white md:min-h-[360px]">
        <img [src]="logo" alt="Logo" class="mb-4 w-24 md:w-28" />

        <h1 class="text-4xl font-black md:text-6xl">
            {{ title }}
        </h1>

        <p class="mt-3 text-2xl font-semibold md:text-4xl">
            {{ subtitle }}
        </p>
    </div>
</section>
