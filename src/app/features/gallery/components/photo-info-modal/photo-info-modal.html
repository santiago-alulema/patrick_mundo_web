@if (photo) {
<div class="fixed inset-0 z-[100] flex items-center justify-center bg-black/45 px-4 py-6 backdrop-blur-[3px]"
    (click)="onClose()">
    <div class="relative w-full max-w-5xl overflow-hidden rounded-[34px] border border-white/40 bg-[#f6efe3] shadow-[0_24px_80px_rgba(0,0,0,0.28)]"
        (click)="$event.stopPropagation()">
        <button type="button" (click)="onClose()"
            class="absolute right-4 top-4 z-10 flex h-12 w-12 items-center justify-center rounded-full border-2 border-[#d25b87] bg-[#f7b3cc] text-xl font-bold text-[#a32156] shadow-md transition hover:scale-105"
            aria-label="Cerrar">
            ✕
        </button>

        <div class="p-6 md:p-8">

            <h2 class="mb-8 text-center text-3xl font-black text-neutral-900 md:text-5xl">
                {{ photo.title }}
            </h2>
            <div class="grid gap-4 md:grid-cols-[0.9fr_1.1fr] items-start">
                <div>
                    <div
                        class="w-full rounded-[10px] border border-black/10 bg-[#e8dfcf] p-3 shadow-[0_6px_18px_rgba(0,0,0,0.10)]">
                        <div class="relative overflow-hidden rounded-[6px] bg-white">
                            <img [src]="photo.imageUrl" [alt]="photo.title"
                                class="h-[200px] w-full object-cover md:h-[240px]" />

                            <div
                                class="pointer-events-none absolute left-1/2 top-0 h-5 w-24 -translate-x-1/2 rotate-[-2deg] bg-[#d7c29f]/85 shadow-sm">
                            </div>
                        </div>

                        <!-- 🔥 INFO MÁS PEQUEÑA -->
                        <div class="mt-3 flex items-center justify-between text-sm font-semibold text-neutral-800">
                            <span>{{ photo.size }}</span>

                            <span class="text-[#cf6a1d] font-bold">
                                {{ photo.price | currency:'USD':'symbol':'1.0-0' }}
                            </span>
                        </div>
                    </div>

                    <!-- 📍 ubicación -->
                    <div class="mt-5 flex items-center justify-center gap-2 text-xl text-neutral-700">
                        <span>📍</span>
                        <span class="font-medium">{{ photo.location }}</span>
                    </div>
                </div>

                <!-- DERECHA: DESCRIPCIÓN -->
                <div class="flex flex-col justify-between">

                    <p class="text-base leading-8 text-neutral-800 md:text-lg">
                        {{ photo.description }}
                    </p>

                    <div class="mt-8 flex justify-center md:justify-center">
                        <button type="button" (click)="onBuy()"
                            class="rounded-full bg-orange-500 px-10 py-3 text-sm font-black tracking-wide text-black shadow-md transition hover:scale-[1.02] hover:bg-orange-400">
                            BUY
                        </button>
                    </div>

                </div>

            </div>
        </div>
    </div>
</div>
}
