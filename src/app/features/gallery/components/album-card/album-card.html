<a [routerLink]="['/gallery', album.id]"
    class="block w-[170px] rotate-[-2deg] rounded-md bg-[#f3efe8] p-2 shadow-[0_8px_20px_rgba(0,0,0,0.18)] transition hover:rotate-0 hover:scale-105">

    <div
        class="mx-auto w-[170px] rotate-[-2deg] rounded-md bg-[#f3efe8] p-2 shadow-[0_8px_20px_rgba(0,0,0,0.18)] transition hover:rotate-0 hover:scale-105">
        <div class="relative overflow-hidden rounded-sm bg-white">
            <img [src]="album.coverImage" [alt]="album.title" class="h-[140px] w-full object-cover" />

            <div class="absolute right-1 top-1 text-xl opacity-80">📎</div>
        </div>

        <div class="mt-2 flex items-start justify-between gap-2 px-1 text-[13px] font-semibold text-neutral-800">
            <div>
                <p>{{ album.title }} -</p>
                <p>{{ album.country }}</p>
            </div>

            <p class="whitespace-nowrap">{{ album.photosCount }} fotos</p>
        </div>
    </div>
</a>
