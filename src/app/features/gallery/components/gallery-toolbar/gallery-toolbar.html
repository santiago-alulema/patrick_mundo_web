<div class="grid gap-6 md:grid-cols-[1fr_auto] md:items-center">
    <div>
        <h2 class="text-3xl font-black text-neutral-900 md:text-5xl">
            {{ title }}
        </h2>
    </div>

    <div class="flex items-center justify-start md:justify-end">
        <div class="w-full max-w-xs rounded-full bg-white px-4 py-3 shadow-md">
            <input type="text" placeholder="Buscar álbum..."
                class="w-full bg-transparent text-sm text-neutral-700 outline-none" (input)="onInput($event)" />
        </div>
    </div>

    <div class="md:col-span-2">
        <h3 class="text-center text-2xl font-bold text-black md:text-4xl">
            {{ subtitle }}
        </h3>
    </div>
</div>
