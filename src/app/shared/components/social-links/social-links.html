<div
    class="rounded-[28px] border border-white/10 bg-white/70 p-5 shadow-[0_12px_40px_rgba(0,0,0,0.08)] backdrop-blur-md">
    <div class="mb-4 flex items-center justify-between gap-3">
        <h3 class="text-lg font-bold text-neutral-900 md:text-xl">
            {{ title }}
        </h3>

        <div class="h-px flex-1 bg-gradient-to-r from-neutral-200 to-transparent"></div>
    </div>

    <div class="flex flex-wrap gap-3">
        @for (item of items; track item.url) {
        <a [href]="item.url" target="_blank" rel="noopener noreferrer"
            class="group inline-flex items-center gap-3 rounded-full border border-neutral-200 bg-white px-4 py-3 text-sm font-semibold text-neutral-700 shadow-sm transition duration-300 hover:-translate-y-0.5 hover:border-orange-300 hover:bg-orange-50 hover:text-orange-600">
            <span class="text-lg transition group-hover:scale-110">
                {{ item.icon }}
            </span>
            <span>{{ item.name }}</span>
        </a>
        }
    </div>
</div>
