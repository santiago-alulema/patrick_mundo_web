<footer class="border-t border-white/10 bg-[#3f311b] text-white">
    <div class="mx-auto max-w-7xl px-6 py-12 md:pt-10 lg:px-16">
        <div class="grid gap-8 lg:grid-cols-[1.1fr_1fr]">
            <div
                class="rounded-[32px] border border-white/10 bg-white/5 p-6 shadow-[0_12px_40px_rgba(0,0,0,0.18)] backdrop-blur-sm">
                <div class="flex items-center gap-3">
                    <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-orange-500 text-xl shadow-lg">
                        🌍
                    </div>

                    <div>
                        <h2 class="text-2xl font-black tracking-wide">
                            {{ brand }}
                        </h2>
                        <p class="text-sm text-white/70">
                            Travel with style
                        </p>
                    </div>
                </div>

                <p class="mt-5 max-w-xl text-sm leading-7 text-white/80 md:text-base">
                    {{ description }}
                </p>

                <div class="mt-8 grid gap-4 sm:grid-cols-2">
                    <div class="rounded-2xl bg-white/5 p-4">
                        <p class="text-xs font-semibold uppercase tracking-[0.18em] text-white/50">
                            Address
                        </p>
                        <p class="mt-2 text-base font-medium text-white/90">
                            {{ address }}
                        </p>
                    </div>

                    <div class="rounded-2xl bg-white/5 p-4">
                        <p class="text-xs font-semibold uppercase tracking-[0.18em] text-white/50">
                            Contact
                        </p>
                        <p class="mt-2 text-sm text-white/90">{{ phone }}</p>
                        <p class="text-sm text-white/90">{{ email }}</p>
                    </div>
                </div>
            </div>

            <app-social-links [title]="'Social media'" [items]="socials" />
        </div>

        <div
            class="mt-8 flex flex-col gap-3 border-t border-white/10 pt-6 text-sm text-white/60 md:flex-row md:items-center md:justify-between">
            <p>{{ copyright }}</p>
            <p>Designed with a modern travel style.</p>
        </div>
    </div>
</footer>
